name: Release + Deploy PWA

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.2.0). Leave empty for auto patch."
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: |
          cd apps/pwa
          bun install

      - name: Compute version
        id: version
        run: |
          if [ -z "${{ inputs.version }}" ]; then
            echo "version=v$(date +'%Y.%m.%d').${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s")
          else
            LOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s")
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build PWA
        run: |
          cd apps/pwa
          bun run build

      - name: Inject build version
        run: |
          echo "${{ steps.version.outputs.version }}" > apps/pwa/dist/version.txt

      - name: Zip build
        run: |
          zip -r dist.zip apps/pwa/dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/pwa/dist

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy Pages
        uses: actions/deploy-pages@v4

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: ${{ needs.build.outputs.version }}
          body: |
            ## Changes
            ${{ needs.build.outputs.changelog }}

            ---
            Auto-generated release from GitHub Actions.
          files: dist.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
