name: Release + Deploy PWA

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v1.2.0). Leave empty for auto patch."
        required: false
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    outputs:
      version: ${{ steps.version.outputs.version }}
      changelog: ${{ steps.changelog.outputs.changelog }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: |
          cd apps/pwa
          bun install

      - name: Compute version
        id: version
        run: |
          if [ -z "${{ inputs.version }}" ]; then
            echo "version=v$(date +'%Y.%m.%d').${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT
          else
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          fi

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s")
          else
            LOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s")
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download Kokoro TTS model (optional, requires HF_TOKEN secret)
        if: ${{ secrets.HF_TOKEN != '' }}
        run: |
          # transformers.js fetches: /models/onnx-community/Kokoro-82M-v1.0-ONNX/resolve/main/<file>
          # so we mirror the HF URL structure exactly under public/models/
          MODEL_DIR=apps/pwa/public/models/onnx-community/Kokoro-82M-v1.0-ONNX/resolve/main
          mkdir -p "$MODEL_DIR/onnx"
          BASE="https://huggingface.co/onnx-community/Kokoro-82M-v1.0-ONNX/resolve/main"
          AUTH="Authorization: Bearer $HF_TOKEN"
          for FILE in tokenizer.json tokenizer_config.json config.json voices.json onnx/model_q8.onnx; do
            echo "Downloading $FILE..."
            curl -fsSL -H "$AUTH" -L "$BASE/$FILE" -o "$MODEL_DIR/$FILE"
          done
          echo "Kokoro model pre-downloaded to $MODEL_DIR"

      - name: Copy Piper phonemize files to public
        run: |
          mkdir -p apps/pwa/public/piper
          cp apps/pwa/node_modules/piper-tts-web/dist/piper/piper_phonemize.wasm apps/pwa/public/piper/
          cp apps/pwa/node_modules/piper-tts-web/dist/piper/piper_phonemize.data apps/pwa/public/piper/

      - name: Copy ORT WASM to public
        run: |
          mkdir -p apps/pwa/public/ort
          cp apps/pwa/node_modules/onnxruntime-web/dist/*.wasm apps/pwa/public/ort/
          cp apps/pwa/node_modules/onnxruntime-web/dist/ort.bundle.min.mjs apps/pwa/public/ort/
          cp apps/pwa/node_modules/onnxruntime-web/dist/ort.min.mjs apps/pwa/public/ort/
          cp apps/pwa/node_modules/onnxruntime-web/dist/ort-wasm-simd-threaded.jsep.mjs apps/pwa/public/ort/
          cp apps/pwa/node_modules/onnxruntime-web/dist/ort-wasm-simd-threaded.mjs apps/pwa/public/ort/
          cp apps/pwa/node_modules/onnxruntime-web/dist/ort.w*.min.mjs apps/pwa/public/ort/ 2>/dev/null || true

      - name: Build PWA
        run: |
          cd apps/pwa
          bun run build

      - name: Inject build version
        run: |
          echo "${{ steps.version.outputs.version }}" > apps/pwa/dist/version.txt

      - name: Zip build
        run: |
          zip -r dist.zip apps/pwa/dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./apps/pwa/dist

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist.zip

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Pages
        uses: actions/deploy-pages@v4

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: ${{ needs.build.outputs.version }}
          body: |
            ## Changes
            ${{ needs.build.outputs.changelog }}

            ---
            Auto-generated release from GitHub Actions.
          files: dist.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
