<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Ambient FM">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2e2860"/>
      <stop offset="1" stop-color="#14112b"/>
    </linearGradient>
    <radialGradient id="disc" cx="42%" cy="38%" r="70%">
      <stop offset="0" stop-color="#726ac9"/>
      <stop offset="0.55" stop-color="#544d94"/>
      <stop offset="1" stop-color="#302a58"/>
    </radialGradient>
    <linearGradient id="sheen" x1="0.08" y1="0.1" x2="0.92" y2="0.9">
      <stop offset="0" stop-color="#8b7bf0"/>
      <stop offset="0.28" stop-color="#bda9f4"/>
      <stop offset="0.5" stop-color="#83e2dd"/>
      <stop offset="0.72" stop-color="#f2a9d6"/>
      <stop offset="1" stop-color="#9b93ea"/>
    </linearGradient>
    <radialGradient id="gloss" cx="36%" cy="30%" r="45%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hole" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#14112b"/>
      <stop offset="1" stop-color="#231d47"/>
    </radialGradient>
    <clipPath id="discClip"><circle cx="256" cy="256" r="190"/></clipPath>
  </defs>

  <!-- app background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- disc body -->
  <circle cx="256" cy="256" r="190" fill="url(#disc)"/>

  <!-- iridescent sheen + gloss + grooves, clipped to the disc -->
  <g clip-path="url(#discClip)">
    <rect x="66" y="66" width="380" height="380" fill="url(#sheen)" opacity="0.5"/>
    <rect x="66" y="66" width="380" height="380" fill="url(#gloss)"/>
    <g fill="none" stroke="#ffffff" opacity="0.12">
      <circle cx="256" cy="256" r="176" stroke-width="1.5"/>
      <circle cx="256" cy="256" r="150" stroke-width="1.5"/>
      <circle cx="256" cy="256" r="124" stroke-width="1.5"/>
      <circle cx="256" cy="256" r="100" stroke-width="1.5"/>
    </g>
  </g>

  <!-- outer edge -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>

  <!-- label ring + center hole -->
  <circle cx="256" cy="256" r="82" fill="#4a4488" opacity="0.5"/>
  <circle cx="256" cy="256" r="54" fill="url(#hole)"/>
  <circle cx="256" cy="256" r="54" fill="none" stroke="#a79ff0" stroke-opacity="0.55" stroke-width="2"/>
</svg>
